name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - "**/*.tex"
      - ".github/workflows/build-resume.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: JonathanL_Resume.tex

      - name: Rename output (optional, keeps a stable filename)
        run: mv JonathanL_Resume.pdf resume.pdf

      - name: Install poppler-utils (for PDF -> PNG conversion)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Generate PNG preview of resume (for README embedding)
        run: |
          pdftoppm -png -r 200 -singlefile resume.pdf resume-preview

      - name: Debug - list files and check gitignore status
        run: |
          echo "== Files in workspace root =="
          ls -la
          echo "== .gitignore contents =="
          cat .gitignore || echo "(no .gitignore found)"
          echo "== git check-ignore for resume.pdf =="
          git check-ignore -v resume.pdf || echo "(not ignored)"
          echo "== git check-ignore for resume-preview.png =="
          git check-ignore -v resume-preview.png || echo "(not ignored)"
          echo "== git status =="
          git status

      - name: Commit updated PDF and preview image
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-build resume PDF + preview [skip ci]"
          file_pattern: "*.pdf *.png"

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: resume.pdf