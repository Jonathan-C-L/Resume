name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - "**/*.tex"
      - ".github/workflows/build-resume.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: JonathanL_Resume.tex

      - name: Rename output (optional, keeps a stable filename)
        run: mv JonathanL_Resume.pdf resume.pdf

      - name: Install poppler-utils (for PDF -> PNG conversion)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Generate PNG preview of resume (for README embedding)
        run: |
          pdftoppm -png -r 200 -singlefile resume.pdf resume-preview

      - name: Commit updated PDF and preview image
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-build resume PDF + preview [skip ci]"
          file_pattern: "*.pdf *.png"

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: resume.pdf

  deploy-to-portfolio:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout resume repo
        uses: actions/checkout@v4
        with:
          path: Resume

      - name: Checkout portfolio repo
        uses: actions/checkout@v4
        with:
          repository: Jonathan-C-L/portfolio-page
          token: ${{ secrets.PORTFOLIO_PAT }}
          path: portfolio-page

      - name: Copy resume files into portfolio assets folder  
        run: |
          mkdir -p portfolio-page/assets
          cp Resume/resume.pdf portfolio-page/assets/resume.pdf
          cp Resume/resume-preview.png portfolio-page/assets/resume-preview.png

      - name: Commit and push to portfolio-page
        working-directory: portfolio-page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/resume.pdf assets/resume-preview.png
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: sync latest resume from resume repo [skip ci]"
          git push
      
